name: halOP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  verify:
    name: Verify Codebase
    runs-on: ubuntu-latest
    env:
      MVN: ./mvnw --show-version --batch-mode --no-transfer-progress
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: maven
      - run: $MVN install
        working-directory: bom
      - run: $MVN compile -P op

  build-development-image:
    name: Build Development Image
    needs: verify
    runs-on: ubuntu-latest
    env:
      MVN: ./mvnw --show-version --batch-mode --no-transfer-progress
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin
          cache: maven
      - run: $MVN package -P op,standalone
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
      - run: podman --version
      - uses: redhat-actions/podman-login@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - name: Build multi-arch image
        run: |
          podman manifest create quay.io/halconsole/hal-op:development
          podman build \
            --platform linux/amd64 \
            --manifest quay.io/halconsole/hal-op:development \
            --label maintainer=hpehl@redhat.com \
            --label org.opencontainers.image.authors=hpehl@redhat.com \
            --label org.opencontainers.image.description="HAL console on premise (development)" \
            --label org.opencontainers.image.licenses=Apache-2.0 \
            --label org.opencontainers.image.source=https://github.com/hal/foundation \
            --label org.opencontainers.image.title="HAL On Premise" \
            --label org.opencontainers.image.url=https://hal.github.io \
            --label org.opencontainers.image.vendor="Red Hat" \
            -f op/standalone/src/main/docker/Dockerfile.jvm \
            op/standalone
          podman build \
            --platform linux/arm64 \
            --manifest quay.io/halconsole/hal-op:development \
            --label maintainer=hpehl@redhat.com \
            --label org.opencontainers.image.authors=hpehl@redhat.com \
            --label org.opencontainers.image.description="HAL console on premise (development)" \
            --label org.opencontainers.image.licenses=Apache-2.0 \
            --label org.opencontainers.image.source=https://github.com/hal/foundation \
            --label org.opencontainers.image.title="HAL On Premise" \
            --label org.opencontainers.image.url=https://hal.github.io \
            --label org.opencontainers.image.vendor="Red Hat" \
            -f op/standalone/src/main/docker/Dockerfile.jvm \
            op/standalone
      - name: Push development image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: podman manifest push quay.io/halconsole/hal-op:development
